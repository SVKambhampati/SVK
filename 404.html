<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | SVK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .notfound {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 2;
    }
    .notfound-code {
      font-family: 'Blanka', sans-serif;
      font-size: clamp(6rem, 20vw, 14rem);
      color: var(--text);
      letter-spacing: 0.12em;
      line-height: 1;
      background: linear-gradient(135deg, #3b82f6, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }
    .notfound-msg {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: var(--text2);
      margin-bottom: 0.75rem;
    }
    .notfound-sub {
      font-size: 0.9rem;
      color: var(--text3);
      margin-bottom: 2.5rem;
      max-width: 360px;
    }
    .notfound-links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <!-- Cursor glow -->
  <div id="cur" aria-hidden="true"></div>

  <!-- Background orbs -->
  <div class="bg-orbs">
    <div class="orb1"></div>
    <div class="orb2"></div>
    <div class="orb3"></div>
  </div>

  <!-- Particle canvas -->
  <canvas id="particles" aria-hidden="true"></canvas>

  <!-- Nav -->
  <nav id="nav">
    <a class="logo" href="index.html">SVK</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#experience">Experience</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="index.html#contact" class="nav-cta">Say hi</a></li>
    </ul>
    <div class="nav-actions">
      <a href="resume.pdf" class="nav-resume" target="_blank" rel="noopener">Resume ↗</a>
      <div class="toggle-switch">
        <input type="checkbox" id="theme-toggle">
        <label for="theme-toggle"></label>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile nav -->
  <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation">
    <button class="mobile-nav-close" id="mobile-nav-close" aria-label="Close menu">✕</button>
    <ul>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#experience">Experience</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="resume.pdf" target="_blank" rel="noopener">Resume ↗</a></li>
      <li><a href="index.html#contact">Say hi</a></li>
    </ul>
  </nav>
  <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>

  <main class="notfound">
    <div class="notfound-code">404</div>
    <p class="notfound-msg">Nothing here.</p>
    <p class="notfound-sub">The page you're looking for doesn't exist or was moved.</p>
    <div class="notfound-links">
      <a href="index.html" class="btn btn-p">← Back home</a>
      <a href="index.html#projects" class="btn btn-s">View projects</a>
    </div>
  </main>

  <footer>
    <span class="foot-l">© 2026 Shreyas Kambhampati</span>
    <a class="foot-logo" href="index.html">SVK</a>
    <span class="foot-r"><a href="index.html">Back home ↑</a></span>
  </footer>

  <script>
    (function() {
      const canvas = document.getElementById('particles');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let points = [];
      function resize() {
        const w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        const count = Math.floor((w * h) / 20000);
        points = [];
        for (let i = 0; i < count; i++) {
          points.push({ x: Math.random()*w, y: Math.random()*h, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5, radius:0.3+Math.random()*1.1, alpha:0.3+Math.random()*0.7 });
        }
      }
      function draw() {
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0,0,w,h);
        points.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1; p.x=(p.x+w)%w; p.y=(p.y+h)%h; });
        const maxDist=90;
        points.forEach((p,i) => { points.slice(i+1).forEach(q => { const d=Math.hypot(p.x-q.x,p.y-q.y); if(d<maxDist){ctx.strokeStyle=`rgba(96,165,250,${(1-d/maxDist)*0.45})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}}); });
        points.forEach(p => { ctx.fillStyle=`rgba(96,165,250,${p.alpha*0.45})`;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill(); });
        requestAnimationFrame(draw);
      }
      resize(); draw(); window.addEventListener('resize', resize);
    })();

    (function() {
      const cur = document.getElementById('cur');
      if (!cur) return;
      let tx=0,ty=0,cx=0,cy=0;
      document.addEventListener('mousemove', e => { tx=e.clientX; ty=e.clientY; });
      function tick() { cx+=(tx-cx)*0.1; cy+=(ty-cy)*0.1; cur.style.left=cx+'px'; cur.style.top=cy+'px'; requestAnimationFrame(tick); }
      tick();
    })();

    document.addEventListener('DOMContentLoaded', function() {
      const toggle = document.getElementById('theme-toggle');
      if (!toggle) return;
      if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); toggle.checked = true; }
      toggle.addEventListener('change', function() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
      });
    });

    document.addEventListener('DOMContentLoaded', function() {
      const hamburger = document.getElementById('hamburger');
      const mobileNav = document.getElementById('mobile-nav');
      const overlay   = document.getElementById('mobile-nav-overlay');
      const closeBtn  = document.getElementById('mobile-nav-close');
      if (!hamburger || !mobileNav) return;
      function openNav() { hamburger.classList.add('open'); hamburger.setAttribute('aria-expanded','true'); mobileNav.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow='hidden'; }
      function closeNav() { hamburger.classList.remove('open'); hamburger.setAttribute('aria-expanded','false'); mobileNav.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; }
      hamburger.addEventListener('click', () => hamburger.classList.contains('open') ? closeNav() : openNav());
      if (closeBtn) closeBtn.addEventListener('click', closeNav);
      overlay.addEventListener('click', closeNav);
      mobileNav.querySelectorAll('a').forEach(a => a.addEventListener('click', closeNav));
    });

    (function() {
      const nav = document.getElementById('nav');
      function update() { if (nav) nav.classList.toggle('scrolled', (window.scrollY||0) > 50); }
      window.addEventListener('scroll', update, { passive: true }); update();
    })();
  </script>
</body>
</html>
