<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="border-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0c0c0b"/>

  <!-- Gradient border -->
  <rect width="32" height="32" rx="7" fill="none"
        stroke="url(#border-grad)" stroke-width="1.5" opacity="0.7"/>

  <!-- SVK — italic serif, gradient fill -->
  <text x="16" y="22"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="14"
        font-weight="700"
        fill="url(#text-grad)"
        letter-spacing="-0.5">SVK</text>
</svg>
